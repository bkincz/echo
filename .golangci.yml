version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - revive
    - gocritic
    - goimports
    - misspell
    - nilerr
    - bodyclose
    - contextcheck

linters-settings:
  goimports:
    local-prefixes: github.com/echo-ssr/echo

  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-declaration
      - name: package-comments
        disabled: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - ifElseChain

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
